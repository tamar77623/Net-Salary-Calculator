<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Salary Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <input type="number" id="inp1" placeholder="Enter the basic salary before any deductions">
    <input type="number" id="inp2" placeholder="Enter the percentage of salary deduction for retirement">
    <input type="number" id="inp3" placeholder="Enter the tax rate">
    <button id="btn">Calculating net salary</button>
    <h3 id="h3"></h3>
    <span id="span1"></span>
    <span id="span2"></span>
    <span id="span3"></span>
    <span id="span4"></span>
    <button id="clear">Clear Result</button>
  </div>
  <script src="main.js"></script>
</body>
</html>
